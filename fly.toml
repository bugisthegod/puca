app = 'irishrailtracker'
primary_region = 'lhr'

[build]

[env]
  BUS_DB_DIR = '/data'

[[mounts]]
  source = 'schedule_dbs'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[deploy]
  strategy = 'immediate'
