app = 'puca'
primary_region = 'lhr'

[build]

[env]
  BUS_DB_DIR = '/data'
  NODE_ENV = 'production'

[[mounts]]
  source = 'schedule_dbs'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  # Always keep one machine alive so the in-process background poller can warm
  # Vehicles + TripUpdates caches every tick. Auto-stop on HTTP idleness would
  # kill the poller during quiet periods, defeating the point.
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[deploy]
  strategy = 'immediate'
