name: Prepare data update PR

on:
  schedule:
    - cron: "30 1 * * *" 
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: data-update
  cancel-in-progress: false

env:
  APP: puca
  FEED_INFO_FILE: .github/data/feed_info.txt
  NTA_ZIP_URL: https://www.transportforireland.ie/transitData/Data/GTFS_Realtime.zip

jobs:
  prepare:
    name: Generate JSON and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download latest NTA GTFS
        run: |
          mkdir -p gtfs
          curl -fL "${NTA_ZIP_URL}?_=$(date +%s)" -o /tmp/GTFS_Realtime.zip
          unzip -q -o /tmp/GTFS_Realtime.zip -d gtfs
          python3 - <<'PY'
          from pathlib import Path

          required = ("routes.txt", "trips.txt", "stop_times.txt", "shapes.txt", "stops.txt", "feed_info.txt")
          missing = [name for name in required if not (Path("gtfs") / name).exists()]
          if missing:
              raise SystemExit(f"Missing GTFS files: {', '.join(missing)}")

          print((Path("gtfs") / "feed_info.txt").read_text(encoding="utf-8-sig"))
          PY
          cp gtfs/feed_info.txt /tmp/feed_info.txt

      - name: Check feed version
        id: feed
        run: |
          DATA=$(sed -n '2p' /tmp/feed_info.txt | tr -d '\r')
          UUID=$(echo "$DATA" | awk -F',' '{print $6}')
          START=$(echo "$DATA" | awk -F',' '{print $4}')
          END=$(echo "$DATA" | awk -F',' '{print $5}')

          ACK_DATA=$(sed -n '2p' "$FEED_INFO_FILE" 2>/dev/null | tr -d '\r')
          ACK_UUID=$(echo "$ACK_DATA" | awk -F',' '{print $6}')
          ACK_START=$(echo "$ACK_DATA" | awk -F',' '{print $4}')
          ACK_END=$(echo "$ACK_DATA" | awk -F',' '{print $5}')

          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "feed_start=$START" >> "$GITHUB_OUTPUT"
          echo "feed_end=$END" >> "$GITHUB_OUTPUT"
          echo "ack_uuid=$ACK_UUID" >> "$GITHUB_OUTPUT"
          echo "ack_feed_start=$ACK_START" >> "$GITHUB_OUTPUT"
          echo "ack_feed_end=$ACK_END" >> "$GITHUB_OUTPUT"

          echo "Repo feed UUID: '${ACK_UUID:-missing}'"
          echo "Latest zip feed UUID: '$UUID'"

          if [ -n "$UUID" ] && [ "$UUID" = "$ACK_UUID" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Feed already matches repo marker; no PR needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate JSON data
        if: steps.feed.outputs.changed == 'true'
        run: bun run json:generate

      - name: Update feed marker
        if: steps.feed.outputs.changed == 'true'
        run: |
          mkdir -p "$(dirname "$FEED_INFO_FILE")"
          cp /tmp/feed_info.txt "$FEED_INFO_FILE"

      - name: Open data update PR
        if: steps.feed.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- src/data "$FEED_INFO_FILE"; then
            echo "No tracked JSON or feed marker changes after generation."
            exit 0
          fi

          BRANCH="bot/nta-data-${{ steps.feed.outputs.uuid }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add src/data "$FEED_INFO_FILE"
          git commit -m "chore(data): NTA feed ${{ steps.feed.outputs.feed_start }}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update NTA static data (${{ steps.feed.outputs.feed_start }})" \
            --body "$(cat <<'BODY'
          NTA published a new static GTFS zip. This PR updates the GTFS-derived JSON files and the tracked feed marker from the latest full zip.

          | field | value |
          |---|---|
          | `feed_start_date` | `${{ steps.feed.outputs.feed_start }}` |
          | `feed_end_date` | `${{ steps.feed.outputs.feed_end }}` |
          | new `feed_version` UUID | `${{ steps.feed.outputs.uuid }}` |
          | previous `feed_start_date` | `${{ steps.feed.outputs.ack_feed_start }}` |
          | previous `feed_end_date` | `${{ steps.feed.outputs.ack_feed_end }}` |
          | previous UUID | `${{ steps.feed.outputs.ack_uuid }}` |

          Source: <${{ env.NTA_ZIP_URL }}>

          ## Included

          - Updated `src/data/*.json` generated with `bun run json:generate`
          - Updated `.github/data/feed_info.txt`

          ## Follow-up

          This workflow continues after opening the PR and uploads matching schedule SQLite DBs to Fly. Merge this PR when you want the new static JSON to ship with the app image.

          Generated by `.github/workflows/prepare-data-update.yml`.
          BODY
          )"

      - name: Generate schedule DBs
        if: steps.feed.outputs.changed == 'true'
        run: bun run db:generate

      - name: Check generated DBs
        if: steps.feed.outputs.changed == 'true'
        run: |
          python3 - <<'PY'
          import sqlite3
          from pathlib import Path

          dbs = (
              "bus-schedule.db",
              "buseireann-schedule.db",
              "goahead-schedule.db",
          )

          for name in dbs:
              path = Path("src/data") / name
              if not path.exists():
                  raise SystemExit(f"Missing DB: {path}")

              with sqlite3.connect(path) as con:
                  integrity = con.execute("PRAGMA integrity_check").fetchone()[0]
                  stop_times = con.execute("SELECT COUNT(*) FROM stop_times").fetchone()[0]

              if integrity != "ok":
                  raise SystemExit(f"{name}: integrity_check={integrity}")
              if stop_times <= 0:
                  raise SystemExit(f"{name}: no stop_times rows")

              print(f"{name}: {stop_times:,} stop_times rows, {path.stat().st_size / 1024 / 1024:.1f} MB")
          PY

      - name: Upload DBs to Fly volume
        if: steps.feed.outputs.changed == 'true'
        run: bun run db:upload
        env:
          APP: ${{ env.APP }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
