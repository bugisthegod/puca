name: Update schedule DBs on Fly

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: schedule-db-update
  cancel-in-progress: false

env:
  APP: puca
  DATA_DIR: /data
  NTA_ZIP_URL: https://www.transportforireland.ie/transitData/Data/GTFS_Realtime.zip

jobs:
  update:
    name: Generate and upload schedule DBs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Download latest NTA GTFS
        run: |
          mkdir -p gtfs
          curl -fL "${NTA_ZIP_URL}?_=$(date +%s)" -o /tmp/GTFS_Realtime.zip
          unzip -q -o /tmp/GTFS_Realtime.zip -d gtfs
          python3 - <<'PY'
          from pathlib import Path

          required = ("routes.txt", "trips.txt", "stop_times.txt", "feed_info.txt")
          missing = [name for name in required if not (Path("gtfs") / name).exists()]
          if missing:
              raise SystemExit(f"Missing GTFS files: {', '.join(missing)}")

          print((Path("gtfs") / "feed_info.txt").read_text(encoding="utf-8-sig"))
          PY
          cp gtfs/feed_info.txt /tmp/feed_info.txt

      - name: Check feed version
        id: feed
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          DATA=$(sed -n '2p' /tmp/feed_info.txt | tr -d '\r')
          UUID=$(echo "$DATA" | awk -F',' '{print $6}')
          START=$(echo "$DATA" | awk -F',' '{print $4}')
          END=$(echo "$DATA" | awk -F',' '{print $5}')

          if flyctl ssh console -a "$APP" --command "cat \"$DATA_DIR/feed_info.txt\"" > /tmp/remote_feed_info.txt; then
            REMOTE_DATA=$(sed -n '2p' /tmp/remote_feed_info.txt | tr -d '\r')
            REMOTE_UUID=$(echo "$REMOTE_DATA" | awk -F',' '{print $6}')
          else
            REMOTE_UUID=""
          fi

          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "feed_start=$START" >> "$GITHUB_OUTPUT"
          echo "feed_end=$END" >> "$GITHUB_OUTPUT"
          echo "remote_uuid=$REMOTE_UUID" >> "$GITHUB_OUTPUT"

          echo "Remote feed UUID: '${REMOTE_UUID:-missing}'"
          echo "Latest zip feed UUID: '$UUID'"

          if [ -n "$UUID" ] && [ "$UUID" = "$REMOTE_UUID" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Feed already uploaded; skipping DB generation and upload."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate schedule DBs
        if: steps.feed.outputs.changed == 'true'
        run: bun run db:generate

      - name: Check generated DBs
        if: steps.feed.outputs.changed == 'true'
        run: |
          python3 - <<'PY'
          import sqlite3
          from pathlib import Path

          dbs = (
              "bus-schedule.db",
              "buseireann-schedule.db",
              "goahead-schedule.db",
          )

          for name in dbs:
              path = Path("src/data") / name
              if not path.exists():
                  raise SystemExit(f"Missing DB: {path}")

              with sqlite3.connect(path) as con:
                  integrity = con.execute("PRAGMA integrity_check").fetchone()[0]
                  stop_times = con.execute("SELECT COUNT(*) FROM stop_times").fetchone()[0]

              if integrity != "ok":
                  raise SystemExit(f"{name}: integrity_check={integrity}")
              if stop_times <= 0:
                  raise SystemExit(f"{name}: no stop_times rows")

              print(f"{name}: {stop_times:,} stop_times rows, {path.stat().st_size / 1024 / 1024:.1f} MB")
          PY

      - name: Upload DBs to Fly volume
        if: steps.feed.outputs.changed == 'true'
        run: bun run db:upload
        env:
          APP: ${{ env.APP }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Save uploaded feed marker
        if: steps.feed.outputs.changed == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl sftp put /tmp/feed_info.txt "$DATA_DIR/feed_info.txt.new" -a "$APP"
          flyctl ssh console -a "$APP" --command "mv \"$DATA_DIR/feed_info.txt.new\" \"$DATA_DIR/feed_info.txt\""
